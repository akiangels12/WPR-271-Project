<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belgium Campus - Courses</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <header>
        <h1>Belgium Campus</h1>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="admissions.html">Admissions</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="search-section">
            <h2>Search for Courses</h2>
            <input type="text" id="search-bar" placeholder="Type course name">
            <button id="search-button">Search</button>
            <div id="course-list"></div>
        </section>

        <section id="course-details-section" class="hidden">
            <div id="course-details"></div>
            <button id="print-button" class="hidden" onclick="window.print()">Print Course</button>
        </section>

        <section id="Display-Course">
            
            <h3 id="backgroundHC">Higher Certificate</h3>
            <h3 id="backgroundDIT">Diploma</h3>
            <h3 id="backgroundBIT">BIT</h3>
            <h3 id="backgroundBCOM">BCOM</h3>
        </section>
        
    </main>
    <footer>
        <p>&copy; 2024 Belgium Campus. All rights reserved.</p>
    </footer>
    <script src="courses.js"></script>
</body>
</html>
